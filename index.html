<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOME</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap');

    /* Sticky Footer Layout */
    html, body {
      height: 100%;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .main-content {
      flex: 1;
    }

    /* Cards Layout */
    .maincontainer {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      margin: 40px 0;
    }

    .maincontainer .card {
      width: 18rem;
    }

    .maincontainer img {
      width: 100%;
      height: auto;
    }

    /* Carousel */
    .carousel {
      width: 80%;
      margin: 0 auto;
    }

    /* Tablet */
    @media (max-width: 992px) {
      .carousel {
        width: 95%;
      }
    }

    /* Mobile */
    @media (max-width: 576px) {
      .carousel {
        width: 100%;
      }

      .maincontainer {
        flex-direction: column;
        align-items: center;
      }

      .navbar-brand {
        font-size: 16px;
      }
    }

  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg bg-body-tertiary" style="background-color: azure;">
    <div class="container-fluid">
      <img style="width: 30px;border-radius: 20px;" src="hawk logo.png" alt="can't load logo">
      <a class="navbar-brand fw-bold" href="index.html">HAWK BATTERY</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
        data-bs-target="#navbarSupportedContent">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link fw-bold" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link fw-bold" href="product.html">PRODUCT</a></li>
          <li class="nav-item"><a class="nav-link fw-bold" href="abouthawk.html">MORE ABOUT HAWK</a></li>
        </ul>

        <form class="d-flex">
          <input class="form-control me-2" type="search" placeholder="Search">
          <button class="btn btn-outline-primary">Search</button>
        </form>
      </div>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <div class="main-content">

    <br>

    <!-- CAROUSEL -->
    <div class="carousel">
      <div id="carouselExampleAutoplaying" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">

          <div class="carousel-item active">
            <img src="carousel image 1.png" class="d-block w-100" alt="">
          </div>

          <div class="carousel-item">
            <img src="carousel image 2.png" class="d-block w-100" alt="">
          </div>

          <div class="carousel-item">
            <img src="carousel image 3-artguru.png" class="d-block w-100" alt="">
          </div>

        </div>

        <button class="carousel-control-prev" type="button"
          data-bs-target="#carouselExampleAutoplaying" data-bs-slide="prev">
          <span class="carousel-control-prev-icon"></span>
        </button>

        <button class="carousel-control-next" type="button"
          data-bs-target="#carouselExampleAutoplaying" data-bs-slide="next">
          <span class="carousel-control-next-icon"></span>
        </button>

      </div>
    </div>

    <!-- CARDS -->
    <div class="maincontainer">

      <div class="card">
        <img src="auto mobile battery.jpg" class="card-img-top">
        <div class="card-body">
          <h5 class="card-title">Automobile Battery</h5>
          <p class="card-text">High performance battery.</p>
          <a href="#" class="btn btn-primary">Go somewhere</a>
        </div>
      </div>

      <div class="card">
        <img src="opzs&opzv.jpg" class="card-img-top">
        <div class="card-body">
          <h5 class="card-title">OPZS & OPZV</h5>
          <p class="card-text">Reliable power solution.</p>
          <a href="#" class="btn btn-primary">Go somewhere</a>
        </div>
      </div>

      <div class="card">
        <img src="sli battery.jpg" class="card-img-top">
        <div class="card-body">
          <h5 class="card-title">SLI Battery</h5>
          <p class="card-text">Strong starting power.</p>
          <a href="#" class="btn btn-primary">Go somewhere</a>
        </div>
      </div>

    </div>

  </div>

  <!-- FOOTER -->
  <footer class="bg-black text-light py-4 mt-auto">
    <div class="container">
      <div class="row text-center text-md-start">

        <div class="col-md-4 mb-3">
          © 2025 Company, Inc
        </div>

        <div class="col-md-4">
          <ul class="nav justify-content-center justify-content-md-end">
            <li class="nav-item"><a href="abouthawk.html" class="nav-link text-light">About</a></li>
            <li class="nav-item"><a href="product.html" class="nav-link text-light">Product</a></li>
            <li class="nav-item"><a href="#" class="nav-link text-light">Support</a></li>
          </ul>
        </div>

      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
